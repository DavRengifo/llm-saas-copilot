services:
  - type: web
    name: llm-copilot-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: API_SECRET_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
